<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSX-R Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden;
        }

        /* 映像エリア：ここが伸縮して調整役になる */
        #video-container { 
            position: relative; 
            flex: 1; 
            background: black; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 200px; /* 最低限の映像サイズ */
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        #overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 40%;
            border: 2px solid rgba(0, 255, 204, 0.4);
            border-radius: 15px;
            pointer-events: none;
        }

        /* 操作パネル：ここを画面下部に「死守」する */
        footer {
            background: #1a1a1a;
            border-top: 2px solid #333;
            padding-bottom: env(safe-area-inset-bottom, 20px); /* iPhoneの下部バー対策 */
            flex-shrink: 0; /* 映像に押し潰されない設定 */
        }

        #result-area { padding: 15px 10px; }

        #label { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #00ffcc; 
            margin-bottom: 4px;
            min-height: 1.8rem;
        }

        #status { font-size: 0.8rem; color: #888; margin-bottom: 10px; }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            padding: 0 10px 15px 10px; 
        }

        button { 
            padding: 14px 24px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 1rem;
            min-width: 130px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-stop { background: #444; color: #ccc; } /* 停止は少し控えめな色に */
        .btn-start { background: #007bff; color: white; } /* 開始を目立たせる */
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <footer>
        <div id="result-area">
            <div id="label">読込中...</div>
            <div id="status">モデルを準備しています</div>
        </div>

        <div class="controls">
            <button class="btn-stop" onclick="stopCamera()">停止</button>
            <button class="btn-start" onclick="startCamera()">開始</button>
        </div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const labelDiv = document.getElementById('label');
        const statusDiv = document.getElementById('status');
        
        let session;
        let labels = [];
        let isRunning = false;

        async function init() {
            try {
                const resp = await fetch('./labels.json');
                if (!resp.ok) throw new Error("labels.json not found");
                labels = await resp.json();
                
                session = await ort.InferenceSession.create('./gsxr_model.onnx', {
                    executionProviders: ['wasm']
                });
                
                labelDiv.innerText = "Ready";
                statusDiv.innerText = "「開始」ボタンを押してください";
                // startCamera(); // ← 自動開始をコメントアウト
            } catch (e) {
                labelDiv.innerText = "Error";
                statusDiv.innerText = e.message;
            }
        }

        async function startCamera() {
            if (isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: false 
                });
                video.srcObject = stream;
                isRunning = true;
                labelDiv.innerText = "探索中...";
                statusDiv.innerText = "バイクを枠内に映してください";
                predictLoop();
            } catch (e) {
                labelDiv.innerText = "Camera Error";
                statusDiv.innerText = "設定からカメラを許可してください";
            }
        }

        function stopCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isRunning = false;
                labelDiv.innerText = "Ready";
                statusDiv.innerText = "カメラ停止中";
            }
        }

        async function predictLoop() {
            if (!session || !isRunning) return;
            const tensor = await preprocess(video);
            try {
                const outputs = await session.run({ input: tensor });
                const outputData = outputs.output.data;
                const maxVal = Math.max(...outputData);
                const maxIdx = outputData.indexOf(maxVal);
                if (maxVal > 0.5) {
                    labelDiv.innerText = labels[maxIdx];
                }
            } catch (e) { console.error(e); }
            if (isRunning) requestAnimationFrame(predictLoop);
        }

        async function preprocess(video) {
            const size = 224;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (vw === 0) return new ort.Tensor('float32', new Float32Array(size * size * 3), [1, 3, size, size]);
            const minSide = Math.min(vw, vh);
            ctx.drawImage(video, (vw - minSide) / 2, (vh - minSide) / 2, minSide, minSide, 0, 0, size, size);
            const imgData = ctx.getImageData(0, 0, size, size).data;
            const floatData = new Float32Array(size * size * 3);
            for (let i = 0; i < size * size; i++) {
                floatData[i] = (imgData[i * 4] / 255 - 0.485) / 0.229;
                floatData[i + size * size] = (imgData[i * 4 + 1] / 255 - 0.456) / 0.224;
                floatData[i + size * size * 2] = (imgData[i * 4 + 2] / 255 - 0.406) / 0.225;
            }
            return new ort.Tensor('float32', floatData, [1, 3, size, size]);
        }
        init();
    </script>
</body>
</html>
