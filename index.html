<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSX-R Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        /* 画面全体を縦に並べる設定 */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        /* カメラ映像エリア：余ったスペースをすべて使う */
        #video-container { 
            position: relative; 
            flex: 1; 
            background: black; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* 照準のような枠（デザイン用） */
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 50%;
            border: 2px solid rgba(0, 255, 204, 0.5);
            border-radius: 20px;
            pointer-events: none;
        }

        /* 判定結果エリア：下側に固定 */
        #result-area { 
            padding: 20px 10px;
            background: #1a1a1a; 
            border-top: 2px solid #333;
            min-height: 100px;
        }

        #label { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #00ffcc; 
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0,255,204,0.3);
        }

        #status { 
            font-size: 0.9rem; 
            color: #888; 
        }

        /* ボタンエリア */
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding-bottom: env(safe-area-inset-bottom, 20px); /* iPhoneのバー対策 */
            background: #1a1a1a;
        }

        button { 
            padding: 12px 28px; 
            border-radius: 30px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-stop { background: #ff4444; color: white; }
        .btn-start { background: #00c851; color: white; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <div id="result-area">
        <div id="label">モデル読込中...</div>
        <div id="status">準備しています</div>
    </div>

    <div class="controls">
        <button class="btn-stop" onclick="stopCamera()">停止</button>
        <button class="btn-start" onclick="startCamera()">開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const labelDiv = document.getElementById('label');
        const statusDiv = document.getElementById('status');
        
        let session;
        let labels = [];
        let isRunning = false;

        // 初期化
        async function init() {
            try {
                const resp = await fetch('./Labels.json');
                if (!resp.ok) throw new Error("Labels.jsonが見つかりません");
                labels = await resp.json();
                
                session = await ort.InferenceSession.create('./gsxr_model.onnx', {
                    executionProviders: ['wasm']
                });
                
                labelDiv.innerText = "準備完了";
                statusDiv.innerText = "カメラを開始してください";
                startCamera();
            } catch (e) {
                labelDiv.innerText = "エラー発生";
                statusDiv.innerText = e.message;
                console.error(e);
            }
        }

        // カメラ開始
        async function startCamera() {
            if (isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: false 
                });
                video.srcObject = stream;
                isRunning = true;
                statusDiv.innerText = "認識中...";
                predictLoop();
            } catch (e) {
                labelDiv.innerText = "カメラエラー";
                statusDiv.innerText = "設定を確認してください";
            }
        }

        // カメラ停止
        function stopCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isRunning = false;
                labelDiv.innerText = "停止中";
                statusDiv.innerText = "ボタンで開始";
            }
        }

        // 判定ループ
        async function predictLoop() {
            if (!session || !isRunning) return;

            const tensor = await preprocess(video);

            try {
                const outputs = await session.run({ input: tensor });
                const outputData = outputs.output.data;
                
                // 最も数値が高いインデックスを抽出
                const maxVal = Math.max(...outputData);
                const maxIdx = outputData.indexOf(maxVal);

                labelDiv.innerText = labels[maxIdx];

            } catch (e) { console.error(e); }
            
            if (isRunning) requestAnimationFrame(predictLoop);
        }

        // 前処理（ResNet18用: 224x224 & 正規化）
        async function preprocess(video) {
            const size = 224;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 映像の中央を正方形に切り抜いてリサイズ
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const minSide = Math.min(vw, vh);
            const sx = (vw - minSide) / 2;
            const sy = (vh - minSide) / 2;
            
            ctx.drawImage(video, sx, sy, minSide, minSide, 0, 0, size, size);
            
            const imgData = ctx.getImageData(0, 0, size, size).data;
            const floatData = new Float32Array(size * size * 3);

            // 学習時と同じImageNet統計値で正規化
            for (let i = 0; i < size * size; i++) {
                floatData[i] = (imgData[i * 4] / 255 - 0.485) / 0.229;                // R
                floatData[i + size * size] = (imgData[i * 4 + 1] / 255 - 0.456) / 0.224; // G
                floatData[i + size * size * 2] = (imgData[i * 4 + 2] / 255 - 0.406) / 0.225; // B
            }
            return new ort.Tensor('float32', floatData, [1, 3, size, size]);
        }

        init();
    </script>
</body>
</html>
