<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSX-R Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 10px; }
        #video-container { position: relative; width: 100%; max-width: 400px; margin: auto; border: 2px solid #007bff; border-radius: 12px; overflow: hidden; background: #000; }
        #video { width: 100%; display: block; }
        #result { font-size: 1.8rem; font-weight: bold; margin-top: 15px; color: #00ffcc; min-height: 2.2rem; }
        #debug { font-size: 0.9rem; color: #888; margin-bottom: 15px; }
        .controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 24px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-start { background: #28a745; color: white; }
        button:active { opacity: 0.7; transform: scale(0.95); }
        canvas { display: none; }
    </style>
</head>
<body>

    <h2 style="font-size: 1rem;">GSX鑑定カメラ</h2>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="result">読込中...</div>
    <div id="debug">スコア: --</div>

    <div class="controls">
        <button class="btn-stop" onclick="stopCamera()">停止</button>
        <button class="btn-start" onclick="startCamera()">開始</button>
    </div>

    <canvas id="canvas" width="224" height="224"></canvas>

    <script>
        const video = document.getElementById('video');
        const resultDiv = document.getElementById('result');
        const debugDiv = document.getElementById('debug');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let session;
        let labels = [];
        let isRunning = false;
        let currentStream = null;

        async function init() {
            try {
                // ファイル名の大文字・小文字をGitHub上の実物に合わせています
                const resp = await fetch('./Labels.json');
                labels = await resp.json();
                
                session = await ort.InferenceSession.create('./gsxr_model.onnx', {
                    executionProviders: ['wasm']
                });
                
                resultDiv.innerText = "準備完了！";
                startCamera(); // 最初は自動起動
            } catch (e) {
                resultDiv.innerText = "読込エラー";
                debugDiv.innerText = e.message;
            }
        }

        async function startCamera() {
            if (isRunning) return;
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" },
                    audio: false 
                });
                video.srcObject = currentStream;
                isRunning = true;
                resultDiv.innerText = "スキャン中...";
                requestAnimationFrame(predictLoop);
            } catch (e) {
                debugDiv.innerText = "カメラ起動失敗: " + e.message;
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isRunning = false;
                resultDiv.innerText = "カメラ停止中";
                debugDiv.innerText = "スコア: --";
            }
        }

        async function predictLoop() {
            if (!session || !isRunning) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const input = new Float32Array(1 * 3 * 224 * 224);
            for (let i = 0; i < 224 * 224; i++) {
                input[i] = imageData.data[i * 4] / 255.0;
                input[i + 50176] = imageData.data[i * 4 + 1] / 255.0;
                input[i + 100352] = imageData.data[i * 4 + 2] / 255.0;
            }

            const tensor = new ort.Tensor('float32', input, [1, 3, 224, 224]);
            
            try {
                const outputs = await session.run({ input: tensor });
                const outputData = outputs[Object.keys(outputs)[0]].data;
                
                let maxIdx = 0;
                let maxVal = -Infinity;
                for(let i=0; i<outputData.length; i++){
                    if(outputData[i] > maxVal){
                        maxVal = outputData[i];
                        maxIdx = i;
                    }
                }

                resultDiv.innerText = labels[maxIdx] || "???";
                debugDiv.innerText = `信頼度スコア: ${maxVal.toFixed(2)}`;

            } catch (e) {
                console.error(e);
            }
            
            if (isRunning) {
                setTimeout(() => requestAnimationFrame(predictLoop), 300);
            }
        }

        init();
    </script>
</body>
</html>
