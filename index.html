<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSX-R YOLO Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 10px; }
        #video-container { position: relative; width: 100%; max-width: 400px; margin: auto; border: 2px solid #007bff; border-radius: 12px; overflow: hidden; background: #000; }
        #video { width: 100%; display: block; }
        /* ビデオの上に重なるキャンバス */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #result { font-size: 1.2rem; font-weight: bold; margin-top: 15px; color: #00ffcc; min-height: 1.5rem; }
        .controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 24px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-start { background: #28a745; color: white; }
    </style>
</head>
<body>

    <h2>GSX-R 複数同時認識カメラ</h2>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas> </div>

    <div id="result">読込中...</div>

    <div class="controls">
        <button class="btn-stop" onclick="stopCamera()">停止</button>
        <button class="btn-start" onclick="startCamera()">開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        
        let session;
        let labels = [];
        let isRunning = false;
        let currentStream = null;

        async function init() {
            try {
                const resp = await fetch('./Labels.json');
                labels = await resp.json();
                
                // YOLOモデルを読み込み
                session = await ort.InferenceSession.create('./gsxr_model.onnx', {
                    executionProviders: ['wasm']
                });
                
                resultDiv.innerText = "準備完了！";
                startCamera();
            } catch (e) {
                resultDiv.innerText = "エラー: " + e.message;
            }
        }

        async function startCamera() {
            if (isRunning) return;
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, audio: false 
            });
            video.srcObject = currentStream;
            isRunning = true;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                predictLoop();
            };
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isRunning = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                resultDiv.innerText = "カメラ停止中";
            }
        }

        async function predictLoop() {
            if (!session || !isRunning) return;

            // 1. 画像の前処理（YOLOは通常640x640または320x320）
            // モデルに合わせてリサイズが必要な場合がありますが、まずはxで送ります
            const input = captureVideoFrame();
            const tensor = new ort.Tensor('float32', input, [1, 3, 640, 640]); // サイズはモデル依存

            try {
                const outputs = await session.run({ x: tensor });
                const outputData = outputs[Object.keys(outputs)[0]].data;
                
                // 2. 描画をクリア
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 3. 解析（YOLOの出力形式に合わせて四角を描く）
                // ここでは簡易的に「最も確率の高いもの」を枠で囲むデモロジックを入れます
                processYOLOOutput(outputData);

            } catch (e) { console.error(e); }
            
            if (isRunning) setTimeout(predictLoop, 100);
        }

        function captureVideoFrame() {
            // 内部処理用のテンソル作成（簡易版）
            return new Float32Array(1 * 3 * 640 * 640).fill(0.5); 
        }

        function processYOLOOutput(data) {
            // 本来はここに複雑なNMS（重複除去）と座標変換が入ります
            // テスト用に画面中央に四角を出すコードを置いておきます
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 5;
            ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);
            ctx.fillStyle = "#00ffcc";
            ctx.font = "20px Arial";
            ctx.fillText("GSX-R 探索中...", 60, 40);
        }

        init();
    </script>
</body>
</html>
