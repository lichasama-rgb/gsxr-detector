<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSX-R Detector Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        h1 { color: #007bff; font-size: 1.2rem; }
        #video-container { position: relative; width: 100%; max-width: 400px; margin: auto; border: 2px solid #444; border-radius: 12px; overflow: hidden; background: #000; }
        #video { width: 100%; display: block; }
        #result { font-size: 1.6rem; font-weight: bold; margin-top: 15px; color: #00ffcc; min-height: 2rem; }
        #status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        .btn { padding: 12px 30px; font-size: 1rem; background: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        .btn:disabled { background: #444; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>GSX-R 鑑定カメラ</h1>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="result">読込中...</div>
    <div id="status">ファイルをチェックしています...</div>

    <button id="start-btn" class="btn" onclick="startCamera()" disabled>カメラ起動</button>

    <canvas id="canvas" width="224" height="224"></canvas>

    <script>
        const video = document.getElementById('video');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let session;
        let labels = [];

        async function init() {
            try {
                // 1. ラベルの読み込み
                const resp = await fetch('./labels.json');
                if (!resp.ok) throw new Error('labels.json がありません');
                labels = await resp.json();
                
                statusDiv.innerText = "モデル本体を読み込み中...";

                // 2. 【超重要】 .onnx と .onnx.data をセットで読み込む設定
                // ブラウザが別ファイル (.data) を見つけられるようにパスを明示します
                session = await ort.InferenceSession.create('./gsxr_model.onnx', {
                    executionProviders: ['wasm']
                });
                
                resultDiv.innerText = "準備完了！";
                statusDiv.innerText = `${labels.length} 種類のモデルを判定できます。`;
                startBtn.disabled = false;
            } catch (e) {
                resultDiv.innerText = "読込失敗";
                statusDiv.innerText = "エラー: " + e.message + "\n※gsxr_model.onnx.data が同じ場所に必要です。";
                console.error(e);
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" },
                    audio: false 
                });
                video.srcObject = stream;
                startBtn.style.display = "none";
                requestAnimationFrame(predictLoop);
            } catch (e) {
                alert("カメラ起動失敗。HTTPSかlocalhostで接続してください。");
            }
        }

        async function predictLoop() {
            if (!session) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const input = new Float32Array(224 * 224 * 3);
            for (let i = 0; i < imageData.data.length / 4; i++) {
                input[i] = imageData.data[i * 4] / 255;           // R
                input[i + 50176] = imageData.data[i * 4 + 1] / 255; // G
                input[i + 100352] = imageData.data[i * 4 + 2] / 255; // B
            }

            const tensor = new ort.Tensor('float32', input, [1, 3, 224, 224]);
            
            try {
                const outputs = await session.run({ input: tensor });
                const outputData = outputs[Object.keys(outputs)[0]].data;
                const maxIdx = outputData.indexOf(Math.max(...outputData));
                resultDiv.innerText = labels[maxIdx] || "解析中...";
            } catch (e) {
                console.error("推論失敗:", e);
            }
            setTimeout(() => requestAnimationFrame(predictLoop), 500);
        }

        init();
    </script>
</body>
</html>
